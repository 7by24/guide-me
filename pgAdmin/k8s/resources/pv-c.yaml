apiVersion: v1
kind: PersistentVolume
metadata:
  name: pgadmin-pv
spec:
  capacity:
    storage: 5Gi
  storageClassName: "slow"
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4.2
  nfs:
    path: /nfs/pv-pgadmin
    server: 10.0.0.10

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-pvc
  namespace: pgadmin
spec:
  resources:
    requests:
      storage: 5Gi
  storageClassName: "slow"
  accessModes:
    - ReadWriteOnce
  volumeName: pgadmin-pv
