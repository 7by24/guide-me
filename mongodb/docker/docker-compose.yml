services:
  mongodb:
    image: mongo:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - 27017:27017
    volumes:
      - ./data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    healthcheck:
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "--eval",
          "db.runCommand({serviceStatus:1}).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    container_name: mongodb
    hostname: mongodb
    networks:
      - default

networks:
  default:
    name: mongodb_network
    driver: bridge
