---
# Homepage configuration
# See https://fontawesome.com/search for icons options

title: "仪表板"
subtitle: "导航"
logo: "assets/logo.png"
# icon: "fas fa-skull-crossbones" # Optional icon

header: true
footer: '<p>Created with <a target="_blank" href="https://github.com/bastienwirtz/homer">homer</a></p>' # set false if you want to hide it.

# Optional theme customization
theme: default

columns: "auto"

# Set the default layout and color scheme
defaults:
  layout: list # Either 'columns', or 'list'
  colorTheme: auto # One of 'auto', 'light', or 'dark'

# Optional theme customization (color overrrides)
# overrrides can also be done using CSS vars
colors:
  light:
    highlight-primary: "rgba(255, 255, 255, 0.15)"
    highlight-secondary: "rgba(255, 255, 255, 0.1)"
    highlight-hover: "rgba(255, 255, 255, 0.25)"
    background: "transparent"
    card-background: "rgba(255, 255, 255, 0.15)"
    text: "#2d3748"
    text-header: "#1a202c"
    text-title: "#2d3748"
    text-subtitle: "#4a5568"
    card-shadow: "0 8px 32px 0 rgba(31, 38, 135, 0.15)"
    link: "#2d3748"
    link-hover: "#4a5568"
    background-image: ""
  dark:
    highlight-primary: "rgba(255, 255, 255, 0.08)"
    highlight-secondary: "rgba(255, 255, 255, 0.05)"
    highlight-hover: "rgba(255, 255, 255, 0.15)"
    background: "transparent"
    card-background: "rgba(255, 255, 255, 0.08)"
    text: "#e2e8f0"
    text-header: "#f7fafc"
    text-title: "#e2e8f0"
    text-subtitle: "#a0aec0"
    card-shadow: "0 8px 32px 0 rgba(0, 0, 0, 0.3)"
    link: "#e2e8f0"
    link-hover: "#a0aec0"
    background-image: ""

stylesheet:
  - "assets/custom.css"
# Optional message
# message:
#   #url: https://b4bz.io
#   style: "is-dark" # See https://bulma.io/documentation/components/message/#colors for styling options.
#   title: "Demo !"
#   icon: "fa fa-grin"
#   content: "This is a dummy homepage demo. <br /> Find more information on <a href='https://github.com/bastienwirtz/homer'>github.com/bastienwirtz/homer</a>"

# Optional navbar
# links: [] # Allows for navbar (dark mode, layout, and search) without any links
links:
  - name: "Github"
    icon: "fab fa-github"
    url: "https://github.com/7by24"
    target: "_blank" # optional html a tag target attribute
  - name: "Grafana"
    icon: "fas fa-wave-square"
    url: "https://grafana.oyea.eu.org"
    target: "_blank"
  # this will link to a second homer page that will load config from additional-page.yml and keep default config values as in config.yml file
  # see url field and assets/additional-page.yml.dist used in this example:
  #- name: "another page!"
  #  icon: "fas fa-file-alt"
  #  url: "#additional-page"

# Optional: enable periodic refresh for all smart cards that implements it (unless overriden at service configuration level).
updateIntervalMs: 30000 # interval in milliseconds, minimum is 1000 (1s). Remove or set to 0 to disable. Can be overriden at service level. (default disabled)

# Services
# First level array represent a group.
# Leave only a "items" key if not using group (group name, icon & tagstyle are optional, section separation will not be displayed).
services:
  - name: "应用"
    icon: "fa-solid fa-cloud"
    items:
      - name: "代码基地"
        type: "Gitea"
        logo: "assets/tools/gitea.png"
        subtitle: "Gitea"
        tag: "selfhosted"
        url: "https://git.oyee.eu.org"
        target: "_blank"

      - name: "Hopin"
        type: "Ping"
        logo: "assets/tools/hopin.png"
        subtitle: "API测试工具"
        tag: "selfhosted"
        url: "https://hopin.oyea.eu.org"
        target: "_blank"

  - name: "资源"
    icon: "fa-solid fa-hard-drive"
    items:
      - name: "Directus"
        type: "Ping"
        logo: "assets/tools/directus.png"
        subtitle: "无头API平台"
        tag: "selfhosted"
        url: "https://directus.oyea.eu.org"
        target: "_blank"

      - name: "pgAdmin"
        type: "Ping"
        logo: "assets/tools/pgadmin.png"
        subtitle: "Postgresql管理工具"
        tag: "selfhosted"
        url: "https://postgres.oyea.eu.org"
        target: "_blank"
