apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hopin-http-route
  namespace: hopin
spec:
  # 引用公共网关
  parentRefs:
    - name: shared-gateway
      namespace: nginx-gateway
  hostnames:
    - "hopin.domain"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: CORS
          cors:
            allowOrigins:
              - "https://domain"
              - "https://www.domain"
              - "https://dash.domain"
              - "https://dashboard.domain"
            allowMethods:
              - GET
              - OPTIONS
            allowHeaders:
              - Content-Type
              - Authorization
            allowCredentials: true
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: Content-Type
                value: "application/json"
              - name: x-apollo-operation-name
                value: "preflight"
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "http://app.hopin_a_b_c"
              - name: Access-Control-Allow-Credentials
                value: "true"
              - name: Access-Control-Allow-Methods
                value: "POST, GET, OPTIONS"
              - name: Access-Control-Allow-Headers
                value: "Content-Type, Authorization, x-apollo-operation-name, apollo-require-preflight"
              - name: Access-Control-Max-Age
                value: "86400"
      backendRefs:
        - name: hopin-svc
          port: 8091

    - matches:
        - path:
            type: PathPrefix
            value: /proxy
      backendRefs:
        - name: hopin-svc
          port: 9159
