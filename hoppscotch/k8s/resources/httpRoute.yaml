apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hopin-http-route
  namespace: hopin
spec:
  # 引用公共网关
  parentRefs:
    - name: shared-gateway
      namespace: nginx-gateway
  hostnames:
    - "hopin.domain"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: CORS
          cors:
            allowMethods:
              - GET
              - POST
              - OPTIONS
            allowHeaders:
              - Content-Type
              - Authorization
            allowCredentials: true
            maxAge: 86400
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
      backendRefs:
        - name: hopin-svc
          port: 8091

    - matches:
        - path:
            type: PathPrefix
            value: /proxy
      backendRefs:
        - name: hopin-svc
          port: 9159
