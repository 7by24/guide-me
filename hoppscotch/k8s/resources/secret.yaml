apiVersion: v1
kind: Secret
metadata:
  name: hopin-secret
  namespace: hopin
type: Opaque
stringData:
  GITHUB_CLIENT_ID: xx
  GITHUB_CLIENT_SECRET: xx
  DATABASE_URL: postgresql://xx:xx@postgres-svc.postgres.svc.cluster.local:5432/hopin?sslmode=verify-ca&sslrootcert=/certs/ca.crt&sslcert=/certs/client.crt&sslkey=/certs/client.key
  DATA_ENCRYPTION_KEY: xx
---
apiVersion: v1
kind: Secret
metadata:
  name: hopin-ssl-certs
  namespace: hopin
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    M
    -----END CERTIFICATE-----
  client.crt: |
    -----BEGIN CERTIFICATE-----

    -----END CERTIFICATE-----
---
apiVersion: v1
kind: Secret
metadata:
  name: hopin-ssl-key
  namespace: hopin
type: Opaque
stringData:
  client.key: |
    -----BEGIN PRIVATE KEY-----
        -----END PRIVATE KEY-----
