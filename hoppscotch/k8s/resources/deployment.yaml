apiVersion: apps/v1
kind: Deployment
metadata:
  name: hopin-deployment
  namespace: hopin
  labels:
    app: hopin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hopin
  template:
    metadata:
      labels:
        app: hopin
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: hopin
          image: hoppscotch/hoppscotch:2026.5.0
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              memory: "2Gi"
              cpu: "2000m"
            requests:
              memory: "1Gi"
              cpu: "1000m"
          ports:
            - containerPort: 80
          command:
            - sh
            - -c
            - pnpm exec prisma migrate deploy && node /usr/src/app/aio_run.mjs
          envFrom:
            - configMapRef:
                name: hopin-config
            - secretRef:
                name: hopin-secret
          volumeMounts:
            - name: ssl-cert
              mountPath: "/certs"
              readOnly: true
          readinessProbe:
            httpGet:
              path: /backend/ping
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

        - name: hopin-proxy
          image: hoppscotch/proxyscotch:v0.1.4
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 9159
      volumes:
        - name: ssl-cert
          secret:
            secretName: hopin-ssl-cert
            items:
              - key: ca.crt
                path: ca.crt
                mode: 0644
