apiVersion: v1
kind: Pod
metadata:
  name: bb
spec:
  containers:
    - name: busybox
      image: busybox
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          memory: "32Mi"
          cpu: "50m"
        requests:
          memory: "32Mi"
          cpu: "10m"
      command:
        - "/bin/sh"
        - "-c"
        - "sleep 86400"
  restartPolicy: Always
