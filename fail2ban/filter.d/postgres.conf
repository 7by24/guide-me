[INCLUDES]
before = common.conf

[Definition]

_daemon = postgres(ql)?(-\d+(\.\d+)?)?

# 方案1：单行写法（推荐，避免换行问题）
failregex = ^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}(?:\.\d+)?\s+(?:GMT|UTC|[+-]\d{4})\s+\[\d+\]\s+[^@]+@<HOST>\s+FATAL:\s+(?:password authentication failed for user "[^"]+"|pg_hba\.conf rejects connection for host "[^"]+", user "[^"]+", database "[^"]+"|unsupported frontend protocol.*|no pg_hba\.conf entry for host "[^"]+", user "[^"]+", database "[^"]+"|role "[^"]+" does not exist|database "[^"]+" does not exist)\s*$

ignoreregex = ^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}(?:\.\d+)?\s+(?:GMT|UTC|[+-]\d{4})\s+\[\d+\]\s+[^@]+@<HOST>\s+LOG:\s+connection authorized:.*$