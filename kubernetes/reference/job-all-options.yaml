apiVersion: batch/v1                    # API 版本，Job 属于 batch 组 v1
kind: Job                               # 资源类型标识，必须为 Job

# ==========================================
# metadata: 资源的元数据信息
# ==========================================
metadata:
  name: example-job                     # Job 名称，同一命名空间内必须唯一
  namespace: default                    # 所属命名空间
  labels:                               # 标签集合
    app: example
    type: batch
  annotations:                            # 注解集合
    description: "One-time batch job"
  generateName: job-                    # 名称前缀（与 name 互斥）
  finalizers:                           # 终结器列表
    - batch.kubernetes.io/job-tracking

# ==========================================
# spec: Job 的核心规约
# ==========================================
spec:
  # --- 并行控制 ---
  parallelism: 1                        # 并行运行的 Pod 数量，默认 1。设为 0 暂停 Job
  completions: 1                        # 成功完成的 Pod 数量，默认 1
  completionMode: NonIndexed              # 完成模式：
                                        # NonIndexed（默认，所有 Pod 等价）
                                        # Indexed（每个 Pod 有唯一索引 0..completions-1）

  # --- 重试策略 ---
  backoffLimit: 6                       # 失败重试次数，默认 6。超过后 Job 标记为 Failed
  backoffLimitPerIndex: 1                 # 每个索引的最大重试次数（仅 completionMode=Indexed，v1.28+ Alpha）

  # --- 活跃期限 ---
  activeDeadlineSeconds: 3600           # Job 最长运行时间（秒），超时后终止所有 Pod
  ttlSecondsAfterFinished: 86400        # Job 完成后自动删除前的存活时间（秒），默认不删除

  # --- 选择算符（通常自动生成，手动设置需谨慎） ---
  selector:                             # Pod 标签选择算符（通常由系统自动生成）
    matchLabels:
      controller-uid: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

  # --- 手动选择器（用于非 Job 控制器创建的 Pod） ---
  manualSelector: false                 # 是否使用手动选择器，默认 false

  # --- 成功策略（仅 completionMode=Indexed，v1.29+ Alpha） ---
  successPolicy:
    rules:
      - succeededCount: 1                 # 满足条件的成功 Pod 数量
        succeededIndexes: "0,2-4"         # 指定索引范围

  # --- Pod 替换策略（v1.32+ Alpha） ---
  podReplacementPolicy: TerminatingOrFailed  # Pod 替换策略：
                                            # TerminatingOrFailed（默认，替换终止或失败的 Pod）
                                            # Failed（仅替换失败的 Pod）

  # --- 挂起 ---
  suspend: false                        # 是否挂起 Job，挂起时不会创建新 Pod

  # ==========================================
  # template: Pod 模板
  # ==========================================
  template:
    metadata:
      labels:                           # Pod 标签
        app: example
        type: batch
      annotations:
        sidecar.istio.io/inject: "false"  # 禁用 sidecar 注入
    spec:
      # --- 容器配置 ---
      containers:
        - name: main-container
          image: perl:5.34
          imagePullPolicy: IfNotPresent
          command:                        # Job 通常需要指定命令
            - perl
            - -Mbignum=bpi
            - -wle
            - "print bpi(2000)"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: JOB_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['job-name']

      # --- 重启策略（Job 只允许 Never 或 OnFailure） ---
      restartPolicy: OnFailure            # 重启策略：Never（失败不重启）/ OnFailure（失败时重启）

      # --- 活跃期限（Pod 级） ---
      activeDeadlineSeconds: 600          # 单个 Pod 最长运行时间

      # --- 终止策略 ---
      terminationGracePeriodSeconds: 30

      # --- 服务账户 ---
      serviceAccountName: job-sa

      # --- 安全上下文 ---
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      # --- 节点亲和性 ---
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - batch

      # --- 容忍度 ---
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "batch"
          effect: "NoSchedule"

# ==========================================
# status: 当前状态（由系统维护）
# ==========================================
status:
  conditions:
    - type: Complete
      status: "True"
      lastProbeTime: "2024-01-01T00:00:00Z"
      lastTransitionTime: "2024-01-01T00:00:00Z"
  startTime: "2024-01-01T00:00:00Z"
  completionTime: "2024-01-01T00:01:00Z"
  active: 0
  succeeded: 1
  failed: 0
