apiVersion: v1                          # API 版本，Secret 属于核心组 v1
kind: Secret                           # 资源类型标识，必须为 Secret

# ==========================================
# metadata: 资源的元数据信息
# ==========================================
metadata:
  name: example-secret                 # Secret 名称，同一命名空间内必须唯一
  namespace: default                   # 所属命名空间，默认 default
  labels:                              # 标签集合
    app: example
    type: secret
  annotations:                         # 注解集合
    description: "Application secrets"
  generateName: secret-               # 名称前缀（与 name 互斥）
  finalizers:                          # 终结器列表
    - kubernetes
  ownerReferences:                     # 所有者引用
    - apiVersion: apps/v1
      kind: Deployment
      name: example-deployment
      uid: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      controller: true
      blockOwnerDeletion: true

# ==========================================
# type: Secret 类型，决定 Secret 的用途和格式
# ==========================================
type: Opaque                           # Secret 类型：
                                       # Opaque(默认，任意键值对)
                                       # kubernetes.io/service-account-token（服务账户 Token）
                                       # kubernetes.io/dockercfg（Docker 注册表认证，已弃用）
                                       # kubernetes.io/dockerconfigjson（Docker 注册表认证 JSON）
                                       # kubernetes.io/basic-auth（基本认证）
                                       # kubernetes.io/ssh-auth（SSH 认证）
                                       # kubernetes.io/tls（TLS 证书和密钥）
                                       # bootstrap.kubernetes.io/token（启动引导 Token）

# ==========================================
# data: 数据（键值对，值必须是 Base64 编码的字符串）
# ==========================================
data:
  username: YWRtaW4=                   # Base64 编码的 "admin"
  password: cGFzc3dvcmQxMjM=           # Base64 编码的 "password123"
  # 注意：实际值必须通过 base64 编码，不能放明文

# ==========================================
# stringData: 字符串数据（v1.14+）
# ==========================================
stringData:                            # 明文字符串，写入时自动 Base64 编码，方便直接写明文
  database_url: "postgres://user:pass@db:5432/mydb"
  api_key: "sk-1234567890abcdef"
  config.json: |                       # 多行 JSON 配置
    {
      "endpoint": "https://api.example.com",
      "timeout": 30
    }

# ==========================================
# immutable: 不可变性（v1.21+）
# ==========================================
immutable: false                       # 是否设置为不可变。设为 true 后不可修改，提升性能和安全性
