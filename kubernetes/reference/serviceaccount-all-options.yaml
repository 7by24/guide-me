apiVersion: v1                          # API 版本，ServiceAccount 属于核心组 v1
kind: ServiceAccount                    # 资源类型标识，必须为 ServiceAccount

# ==========================================
# metadata: 资源的元数据信息
# ==========================================
metadata:
  name: example-sa                      # ServiceAccount 名称，同一命名空间内必须唯一
  namespace: default                    # 所属命名空间
  labels:                               # 标签集合
    app: example
    type: service-account
  annotations:                            # 注解集合
    description: "Application service account"
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role  # AWS IAM 角色注解（EKS）
    # iam.gke.io/gcp-service-account: my-gcp-sa@project.iam.gserviceaccount.com  # GCP 服务账户注解（GKE）
  generateName: sa-                     # 名称前缀（与 name 互斥）

# ==========================================
# automountServiceAccountToken: 是否自动挂载 Token
# ==========================================
automountServiceAccountToken: true      # 是否自动挂载 ServiceAccount Token 到 Pod 中
                                        # true（默认，Pod 可访问 API Server）
                                        # false（增强安全性，需显式挂载）

# ==========================================
# imagePullSecrets: 镜像拉取 Secret 列表
# ==========================================
imagePullSecrets:                       # 关联的镜像拉取 Secret，Pod 使用此 SA 时自动挂载
  - name: regcred                       # Secret 名称，需为 docker-registry 类型
  - name: private-registry-secret

# ==========================================
# secrets: 允许此 SA 挂载的 Secret 列表（已弃用，不建议使用）
# ==========================================
secrets:                                # 允许此 ServiceAccount 引用的 Secret 列表
  - name: my-secret                     # Secret 名称
    namespace: default                  # Secret 所在命名空间
