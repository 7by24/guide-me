apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv # 注意：StatefulSet 会为每个 Pod 创建独立 PVC
  labels:
    app: postgres-pv
    pod-index: "0" # 用于匹配特定 Pod
spec:
  capacity:
    storage: 20Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: "" # ← 必须为空字符串，禁用动态供给
  # claimRef: # 预绑定到特定 PVC
  #  namespace: postgres
  #  name: data-postgres-statefulset-0 # StatefulSet 自动创建的 PVC 名称格式：<volumeClaimTemplate-name>-<statefulset-name>-<ordinal>
  nfs:
    path: /nfs/pv-postgres # 每个 Pod 独立的 NFS 路径
    server: 10.0.0.10
  mountOptions:
    - hard
    - nfsvers=4.2
