services:
   postgres:
      image: postgres:18.3
      restart: unless-stopped
      env_file: .env
      command: >
         postgres
         -c config_file=/conf.d/postgresql.conf
      ports:
         - IP:5432:5432
      environment:
         POSTGRES_USER: ${POSTGRES_USER}
         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
         POSTGRES_DB: ${POSTGRES_DB}
         POSTGRES_INITDB_ARGS: "--auth=scram-sha-256 --encoding=UTF8 --data-checksums"
      volumes:
         - ./data:/var/lib/postgresql
         - ./conf.d:/conf.d
         - ./certs/server:/certs:ro

      healthcheck:
         test: ["CMD-SHELL", "pg_isready"]
         interval: 10s
         timeout: 5s
         retries: 5
         start_period: 60s
      container_name: postgres
      hostname: postgres
      networks:
         - default

networks:
   default:
      name: postgres_network
      driver: bridge