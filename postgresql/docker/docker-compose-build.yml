services:
   postgres:
      build:
        context: .
        args:
          - BUILD_VERSION=${BUILD_VERSION}
          - BUILD_DATE=${BUILD_DATE}
      image: registry.example.com/my-postgres:pg18-${BUILD_VERSION}
      restart: unless-stopped
      env_file: .env
      command: >
         postgres
         -c config_file=/conf.d/postgresql.conf
      ports:
         - IP:5432:5432
      environment:
         POSTGRES_USER: ${POSTGRES_USER}
         POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
         POSTGRES_DB: ${POSTGRES_DB}
         POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --encoding=UTF8 --data-checksums"
      volumes:
         - ./data:/var/lib/postgresql
         - ./conf.d:/conf.d
         - ./certs/server:/certs:ro

      healthcheck:
         test: ["CMD-SHELL", "pg_isready"]
         interval: 10s
         timeout: 5s
         retries: 5
         start_period: 60s
      container_name: postgres-vector-gis
      hostname: postgres-vector-gis
      networks:
         - default

networks:
   default:
      name: postgres_network
      driver: bridge