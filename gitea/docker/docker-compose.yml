services:
  gitea:
    image: gitea/gitea:latest
    restart: unless-stopped
    volumes:
      - $PWD/app:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/log/gitea:/data/gitea/log
      - /home/git/.ssh:/data/git/.ssh
      - /home/git/.postgresql:/data/git/.postgresql
    ports:
      - "127.0.0.1:222:22"
      - "127.0.0.1:3000:3000"
    environment:
      - USER_UID=103
      - USER_GID=104
      - TZ=Asia/Shanghai
      - GITEA__database__DB_TYPE=$DATABASE_TYPE
      - GITEA__database__HOST=$DATABASE_HOST
      - GITEA__database__NAME=$DATABASE_NAME
      - GITEA__database__USER=$DATABASE_USER
      - GITEA__database__PASSWD=$DATABASE_PASSWORD
      - GITEA_CUSTOM=/data/gitea/custom
    container_name: gitea
    hostname: gitea
    networks:
      - web
      - postgres

networks:
  web:
    name: nginx_network
    external: true
  postgres:
    name: postgres_network
    external: true