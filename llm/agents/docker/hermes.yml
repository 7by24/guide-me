services:
  hermes-gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-gateway
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - $PWD/data:/opt/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "9119:9119"
    volumes:
      - ./data:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://hermes-agent:8642
      - TZ=Asia/Shanghai
    networks:
      - network
    depends_on:
      - hermes-gateway
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  network:
    name: agent_network
    external: true
