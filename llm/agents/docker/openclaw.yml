services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "18789:18789"
    volumes:
      - ./data:${OPENCLAW_HOME_DIR} # Config and data
    environment:
      - OPENCLAW_HOME_VOLUME=${OPENCLAW_HOME_DIR}
      - TZ=Asia/Shanghai # Set your timezone
    mem_limit: 2g # Prevent runaway memory usage
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - network

networks:
  network:
    name: agent_network
    external: true
